<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Time Tracker</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <div class="header-copy">
          <p class="app-label">YouTube Time</p>
          <h1>Today</h1>
          <button id="pause-toggle" class="pause-toggle" type="button">Pause</button>
        </div>
        <strong id="today-total" class="today-total">0s</strong>
        <div id="counting-indicator" class="status-pill header-status" data-state="inactive" aria-live="polite">
          <span class="status-dot" aria-hidden="true"></span>
          <span id="counting-label">Paused</span>
        </div>
      </header>

      <section class="chart-section">
        <div class="chart-header">
          <h2>Last 14 days</h2>
        </div>
        <div id="history-chart" class="history-chart" aria-label="Last 14 days of YouTube time"></div>
        <p id="chart-empty-state" class="chart-empty-state">No tracked days yet.</p>
      </section>
    </main>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
